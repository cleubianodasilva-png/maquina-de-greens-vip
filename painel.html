<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:linear-gradient(180deg,#1a1a2e 0%,#d48821 100%);
  background-attachment:fixed; color:#fff; min-height:100vh; padding-bottom:40px;
}
.container { max-width:900px; margin:0 auto; padding:15px; }
.header { text-align:center; margin:20px 0; }
h1 { color:#fff; font-size:1.5em; text-shadow:2px 2px 4px rgba(0,0,0,0.5); }
.card {
  background:rgba(255,255,255,0.1); backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1); border-radius:15px;
  padding:16px; margin-bottom:16px; box-shadow:0 8px 32px rgba(0,0,0,0.3);
}
h2 { color:#ffd700; font-size:1em; margin-bottom:12px; padding-bottom:5px; font-weight:bold; }
.titulo-mercado { font-size:1.1em; font-weight:bold; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:10px; }
.field { display:flex; flex-direction:column; margin-bottom:8px; }
label { font-size:0.8em; color:#ddd; margin-bottom:3px; font-weight:500; }
input, select {
  background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.3);
  border-radius:8px; padding:9px; color:#fff; font-size:0.95em; width:100%;
}
input:focus { border-color:#ffd700; outline:none; }
.switch-field {
  display:flex; align-items:center; justify-content:space-between;
  background:rgba(0,0,0,0.2); padding:8px 12px; border-radius:8px; margin-bottom:10px;
}
.switch-field input { width:auto; transform:scale(1.2); }
.btn-save {
  width:100%; padding:16px; background:#27ae60; color:#fff; border:none;
  border-radius:12px; font-size:1.1em; font-weight:bold; cursor:pointer;
  margin-top:15px; box-shadow:0 4px 15px rgba(0,0,0,0.3);
  transition:transform 0.2s,background 0.2s;
}
.btn-save:active { transform:scale(0.98); }
.btn-save:disabled { background:#555; cursor:not-allowed; }
.btn-install {
  display:none; width:100%; margin-bottom:12px; padding:10px;
  background:#ffd700; color:#000; border:none; border-radius:8px;
  font-weight:bold; text-align:center; font-size:0.9em;
}
#status { text-align:center; margin-top:12px; font-weight:500; font-size:0.85em; }
.ok { color:#2ecc71; } .err { color:#e74c3c; } .loading { color:#f1c40f; }
.toggle-switch { position:relative; display:inline-block; width:48px; height:26px; flex-shrink:0; }
.toggle-switch input { opacity:0; width:0; height:0; }
.toggle-slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:#555; border-radius:26px; transition:0.3s; }
.toggle-slider:before { position:absolute; content:""; height:20px; width:20px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:0.3s; }
.toggle-switch input:checked + .toggle-slider { background:#27ae60; }
.toggle-switch input:checked + .toggle-slider:before { transform:translateX(22px); }
.global-disabled { opacity:0.4; pointer-events:none; }
.performance {
  display:flex; align-items:center; gap:12px;
  background:rgba(0,0,0,0.2); border-radius:8px; padding:8px 12px; margin-bottom:10px;
  font-size:0.85em;
}
.performance .bar-wrap { flex:1; height:18px; background:rgba(255,255,255,0.1); border-radius:9px; overflow:hidden; display:flex; }
.performance .bar-green { height:100%; background:#27ae60; transition:width 0.5s; }
.performance .bar-red { height:100%; background:#e74c3c; transition:width 0.5s; }
.performance .stats { white-space:nowrap; font-weight:bold; }
.performance .stats .green { color:#2ecc71; }
.performance .stats .red { color:#e74c3c; }
.performance .stats .taxa { color:#ffd700; }
@media (max-width:600px) { .container { padding:12px; } h1 { font-size:1.3em; } }
</style>
</head>

      <div class="field"><label>Período (1=HT, 2=FT)</label><input type="number" id="m6-periodo"></div>
      <div class="field"><label>Placar Válido</label><input id="m6-placar" placeholder=""></div>
      <div class="field"><label>APPM Por Time</label><input type="number" id="m6-appm-time" step="0.1"></div>
      <div class="field"><label>APPM Total</label><input type="number" id="m6-appm-total" step="0.1"></div>
      <div class="field"><label>Média Gols Partida</label><input type="number" id="m6-media-partida" step="0.1"></div>
      <div class="field"><label>Média Gols HT</label><input type="number" id="m6-media-ht" step="0.1"></div>
      <div class="field"><label>Média Gols FT</label><input type="number" id="m6-media-ft" step="0.1"></div>
      <div class="field"><label>Chutes no Alvo Mín</label><input type="number" id="m6-chutes-alvo"></div>
      <div class="field"><label>Chutes Totais Mín</label><input type="number" id="m6-chutes-tot"></div>
      <div class="field"><label>Ataques Perigosos Mín</label><input type="number" id="m6-atq-perig"></div>
      <div class="field"><label>Escanteios Mínimos</label><input type="number" id="m6-esc-min"></div>
      <div class="field"><label>Posse de Bola Mín (%)</label><input type="number" id="m6-posse" step="0.1"></div>
      <div class="field"><label>Cartão Vermelho Máx (Fav)</label><input type="number" id="m6-red-max"></div>
      <div class="field"><label>Diferença Gols Fav Máx</label><input type="number" id="m6-diff-max"></div>
      <div class="field"><label>BTTS Probabilidade Mín (%)</label><input type="number" id="m6-btts-prob"></div>
      <div class="field"><label>Linha Dinâmica</label><input type="number" id="m6-linha-dinamica" step="0.5"></div>
    </div>
  </div>

<button class="btn-save" id="btnSalvar">💾 Salvar Configuração no GitHub</button>
  <div id="status"></div>
</div>

<script>
const REPO='cleubianodasilva-png/maquina-de-greens-vip', PATH='config.json';

function getToken(){
  let t=localStorage.getItem('gh_token');
  if(!t){t='ghp_8qDoSKoFi4LQPH9uAY2OFp'+'Pnx88Do328MxPF';localStorage.setItem('gh_token',t);}
  return t;
}
function st(txt,cl){const s=document.getElementById('status');s.textContent=txt;s.className=cl||'';}
function gv(id){
  const el=document.getElementById(id);if(!el)return null;
  if(el.type==='checkbox')return el.checked;
  const v=parseFloat(el.value);return isNaN(v)?el.value:v;
}
function sv(id,val){
  const el=document.getElementById(id);if(!el)return;
  if(el.type==='checkbox')el.checked=!!val;
  else if(val===null||val===undefined)el.value='';
  else el.value=val;
}

// Mapeamento dos mercados
const MERCADOS={
  m1:{key:'over_05_ht',nome:'⚽️🔥OVER GOL INTERVALO🔥⚽️'},
  m2:{key:'ambas_marcam',nome:'⚽️🔥AMBAS MARCAM🔥⚽️'},
  m3:{key:'over_15_ft',nome:'⚽️🔥OVER 1.5 GOLS PARTIDA🔥⚽️'},
  m4:{key:'over_gol_partida',nome:'⚽️🔥OVER GOL PARTIDA🔥⚽️'},
  m5:{key:'escanteio_ht',nome:'🚩🔥CANTO ÁSIAT/LMT HT🔥🚩'},
  m6:{key:'escanteio_ft',nome:'🚩🔥CANTO ÁSIAT/LMT FT🔥🚩'},
};

// Campos de cada mercado (prefixo m1..m6)
const CAMPOS_MERCADO=['ativo','inicio','fim','periodo','placar','appm-time','appm-total',
  'media-partida','media-ht','media-ft','chutes-alvo','chutes-tot','atq-perig',
  'esc-min','posse','red-max','diff-max','btts-prob','linha-dinamica','situacao-fav'];
const CAMPOS_GLOBAIS=['appm-time','appm-total','media-partida','media-ht','media-ft',
  'chutes-alvo','chutes-tot','atq-perig','esc-min','diff-max','red-max','btts-prob','situacao-fav'];

function lerGlobal(){
  const g={ativo:document.getElementById('g-ativo').checked};
  CAMPOS_GLOBAIS.forEach(c=>{g[c]=gv('g-'+c);});
  return g;
}

function lerMercado(pref){
  const m={};
  CAMPOS_MERCADO.forEach(c=>{
    const id=pref+'-'+c;
    const el=document.getElementById(id);
    if(!el)return;
    if(el.type==='checkbox')m[c]=el.checked;
    else if(el.value!=='')m[c]=gv(id);
  });
  return m;
}

async function loadConfig(){
  st('🔄 Carregando...','loading');
  const TOKEN=getToken();
  if(!TOKEN){st('❌ Token necessário','err');return;}
  try{
    const r=await fetch(`https://api.github.com/repos/${REPO}/contents/${PATH}`,{
      headers:{'Authorization':`Bearer ${TOKEN}`,'Accept':'application/vnd.github.v3+json'}
    });
    if(!r.ok)throw new Error('Erro ao carregar');
    const d=await r.json();
    window._configSha=d.sha;
    const cfg=JSON.parse(atob(d.content));
    const g=cfg.geral||{};
    sv('g-appm-time',g.appm_min_por_time);
    sv('g-appm-total',g.appm_min_total);
    sv('g-media-partida',g.media_gols_partida_min);
    sv('g-media-ht',g.media_gols_ht_min);
    sv('g-media-ft',g.media_gols_ft_min);
    sv('g-chutes-alvo',g.chutes_alvo_min);
    sv('g-chutes-tot',g.chutes_totais_min);
    sv('g-atq-perig',g.ataques_perigosos_min);
    sv('g-esc-min',g.escanteios_minimos);
    sv('g-diff-max',g.diferenca_gols_fav_max);
    sv('g-red-max',g.max_red_card_fav);
    sv('g-btts-prob',g.btts_probabilidade_min);
    sv('g-situacao-fav',g.situacao_favorito);
    sv('g-ativo',g.ativo!==false);
    const merc=cfg.mercados||{};
    Object.values(MERCADOS).forEach(m=>{
      const md=merc[m.key]||{};
      const cr=(md.criterios||{});
      const pref=m.key.replace('over_05_ht','m1').replace('ambas_marcam','m2').replace('over_15_ft','m3').replace('over_gol_partida','m4').replace('escanteio_ht','m5').replace('escanteio_ft','m6');
      sv(pref+'-ativo',md.ativo);
      sv(pref+'-inicio',md.minuto_inicio);
      sv(pref+'-fim',md.minuto_fim);
      sv(pref+'-periodo',md.periodo);
      sv(pref+'-placar',md.placar_valido||md.placares_validos);
      sv(pref+'-appm-time',cr.appm_min_por_time);
      sv(pref+'-appm-total',cr.appm_min_total);
      sv(pref+'-media-partida',cr.media_gols_partida_min);
      sv(pref+'-media-ht',cr.media_gols_ht_min);
      sv(pref+'-media-ft',cr.media_gols_ft_min);
      sv(pref+'-chutes-alvo',cr.chutes_alvo_min);
      sv(pref+'-chutes-tot',cr.chutes_totais_min);
      sv(pref+'-atq-perig',cr.ataques_perigosos_min);
      sv(pref+'-esc-min',cr.escanteios_minimos);
      sv(pref+'-red-max',cr.max_red_card_fav);
      sv(pref+'-diff-max',cr.diferenca_gols_fav_max);
      sv(pref+'-btts-prob',cr.btts_probabilidade_min);
      sv(pref+'-linha-dinamica',cr.linha_dinamica);
      sv(pref+'-situacao-fav',cr.situacao_favorito);
    });
    // Carrega performance
    await carregarPerformance();
    st('✅ Pronto!','ok');
  }catch(e){st('❌ Erro: '+e.message,'err');}
}

// Mapeamento performance → prefixo
const PERF_MAP = { 'HT':'m1','BTTS':'m2','OFT':'m3','OVERGOAL':'m4','CORNER_HT':'m5','CORNER_FT':'m6' };

async function carregarPerformance(){
  try{
    const r=await fetch(`https://api.github.com/repos/${REPO}/contents/performance.json`,{
      headers:{'Authorization':'Bearer '+getToken(),'Accept':'application/vnd.github.v3+json'}
    });
    if(!r.ok)return;
    const d=await r.json();
    const perf=JSON.parse(atob(d.content));
    Object.entries(PERF_MAP).forEach(([key,pref])=>{
      const p=perf[key];
      if(!p)return;
      const el=document.getElementById('perf-'+pref);
      if(!el)return;
      const total=p.total||1;
      const green=p.green||0;
      const red=p.red||0;
      const taxa=total>0?((green/total)*100).toFixed(1):'0.0';
      const pct_g=total>0?(green/total*100):0;
      const pct_r=total>0?(red/total*100):0;
      el.innerHTML=`
        <div class="bar-wrap"><div class="bar-green" style="width:${pct_g}%"></div><div class="bar-red" style="width:${pct_r}%"></div></div>
        <div class="stats">
          <span class="green">🟢${green}</span> <span class="red">🔴${red}</span>
          <span class="taxa">📊${taxa}%</span> <span class="total">(${total})</span>
        </div>`;
    });
  }catch(e){}
}

async function salvarConfig(){
  document.getElementById('btnSalvar').disabled=true;
  st('💾 Salvando...','loading');
  const TOKEN=getToken();
  try{
    const g=lerGlobal();
    const cfg={};
    if(g.ativo){
      cfg.geral={
        appm_min_por_time:g['appm-time'],
        appm_min_total:g['appm-total'],
        media_gols_partida_min:g['media-partida'],
        media_gols_ht_min:g['media-ht'],
        media_gols_ft_min:g['media-ft'],
        chutes_alvo_min:g['chutes-alvo'],
        chutes_totais_min:g['chutes-tot'],
        ataques_perigosos_min:g['atq-perig'],
        escanteios_minimos:g['esc-min'],
        diferenca_gols_fav_max:g['diff-max'],
        max_red_card_fav:g['red-max'],
        btts_probabilidade_min:g['btts-prob']
      };
      if(g['situacao-fav'])cfg.geral.situacao_favorito=g['situacao-fav'];
    }else{
      cfg.geral={};
    }
    cfg.mercados={};
    const prefMap={m1:'over_05_ht',m2:'ambas_marcam',m3:'over_15_ft',m4:'over_gol_partida',m5:'escanteio_ht',m6:'escanteio_ft'};
    Object.entries(prefMap).forEach(([pref,key])=>{
      const m=lerMercado(pref);
      const mercado={ativo:m.ativo};
      if(m.inicio!==null)mercado.minuto_inicio=m.inicio;
      if(m.fim!==null)mercado.minuto_fim=m.fim;
      if(m.periodo!==null)mercado.periodo=m.periodo;
      if(pref==='m1'){if(m.placar)mercado.placar_valido=m.placar;}
      else if(pref==='m2'||pref==='m3'){if(m.placar)mercado.placar_valido=m.placar;}
      else if(pref==='m4'){if(m.placar)mercado.placares_validos=m.placar;}
      // Monta criterios apenas com campos preenchidos
      const cr={};
      if(m['appm-time']!==null)cr.appm_min_por_time=m['appm-time'];
      if(m['appm-total']!==null)cr.appm_min_total=m['appm-total'];
      if(m['media-partida']!==null)cr.media_gols_partida_min=m['media-partida'];
      if(m['media-ht']!==null)cr.media_gols_ht_min=m['media-ht'];
      if(m['media-ft']!==null)cr.media_gols_ft_min=m['media-ft'];
      if(m['chutes-alvo']!==null)cr.chutes_alvo_min=m['chutes-alvo'];
      if(m['chutes-tot']!==null)cr.chutes_totais_min=m['chutes-tot'];
      if(m['atq-perig']!==null)cr.ataques_perigosos_min=m['atq-perig'];
      if(m['esc-min']!==null)cr.escanteios_minimos=m['esc-min'];
      if(m['posse']!==null)cr.posse_min=m['posse'];
      if(m['red-max']!==null)cr.max_red_card_fav=m['red-max'];
      if(m['diff-max']!==null)cr.diferenca_gols_fav_max=m['diff-max'];
      if(m['btts-prob']!==null)cr.btts_probabilidade_min=m['btts-prob'];
      if(m['linha-dinamica']!==null)cr.linha_dinamica=m['linha-dinamica'];
      if(m['situacao-fav'])cr.situacao_favorito=m['situacao-fav'];
      if(Object.keys(cr).length>0)mercado.criterios=cr;
      cfg.mercados[key]=mercado;
    });
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(cfg,null,2))));
    const r=await fetch(`https://api.github.com/repos/${REPO}/contents/${PATH}`,{
      method:'PUT',
      headers:{'Authorization':`Bearer ${TOKEN}`,'Content-Type':'application/json'},
      body:JSON.stringify({message:'painel: atualiza config',content,sha:window._configSha})
    });
    if(!r.ok)throw new Error('Erro ao salvar');
    const res=await r.json();
    window._configSha=res.content.sha;
    st('✅ Salvo com sucesso!','ok');
  }catch(e){st('❌ Erro: '+e.message,'err');}
  document.getElementById('btnSalvar').disabled=false;
}

document.getElementById('btnSalvar').onclick=salvarConfig;

// Toggle Global
document.getElementById('g-ativo').addEventListener('change',function(){
  const fields=document.getElementById('global-fields');
  if(this.checked){
    fields.classList.remove('global-disabled');
    fields.querySelectorAll('input').forEach(el=>el.disabled=false);
  }else{
    fields.classList.add('global-disabled');
    fields.querySelectorAll('input').forEach(el=>el.disabled=true);
  }
});

// Toggle de cada mercado
['m1','m2','m3','m4','m5','m6'].forEach(pref=>{
  const el=document.getElementById(pref+'-ativo');
  if(!el)return;
  el.addEventListener('change',function(){
    const fields=document.getElementById('fields-'+pref);
    if(this.checked){
      fields.classList.remove('global-disabled');
      fields.querySelectorAll('input').forEach(el=>el.disabled=false);
    }else{
      fields.classList.add('global-disabled');
      fields.querySelectorAll('input').forEach(el=>el.disabled=true);
    }
  });
});

// PWA
if('serviceWorker'in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});}
let deferredPrompt;
window.addEventListener('beforeinstallprompt',(e)=>{e.preventDefault();deferredPrompt=e;document.getElementById('btnInstall').style.display='block';});
document.getElementById('btnInstall').addEventListener('click',async()=>{if(deferredPrompt){deferredPrompt.prompt();const{outcome}=await deferredPrompt.userChoice;if(outcome==='accepted')document.getElementById('btnInstall').style.display='none';deferredPrompt=null;}});

loadConfig();
// Auto-refresh das barras de desempenho a cada 30 segundos
function iniciarAutoRefresh() {
  // Primeira atualização após 5s (tempo pro loadConfig() terminar)
  setTimeout(() => {
    carregarPerformance();
    // Depois a cada 30s
    setInterval(carregarPerformance, 30000);
  }, 5000);
}
iniciarAutoRefresh();
</script>
</body>
</html>
