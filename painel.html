<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Máquina de Greens VIP - Painel</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
    background: linear-gradient(180deg, #1a1a2e 0%, #d48821 100%);
    background-attachment: fixed;
    color: #ffffff; 
    min-height: 100vh;
    padding-bottom: 40px;
}
.container { max-width: 900px; margin: 0 auto; padding: 20px; }
.header { text-align: center; margin: 30px 0; }
h1 { color: #ffffff; font-size: 1.8em; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
.card { 
    background: rgba(255, 255, 255, 0.1); 
    backdrop-filter: blur(10px); 
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 15px; 
    padding: 20px; 
    margin-bottom: 20px; 
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
h2 { color: #ffd700; font-size: 1.2em; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
.field { display: flex; flex-direction: column; margin-bottom: 12px; }
label { font-size: 0.85em; color: #ddd; margin-bottom: 4px; font-weight: 500; }
input, select { 
    background: rgba(0,0,0,0.3); 
    border: 1px solid rgba(255,255,255,0.3); 
    border-radius: 8px; 
    padding: 10px; 
    color: white; 
    font-size: 1em;
}
input:focus { border-color: #ffd700; outline: none; }
.switch-field { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; }
.btn-save { 
    width: 100%; 
    padding: 18px; 
    background: #27ae60; 
    color: white; 
    border: none; 
    border-radius: 12px; 
    font-size: 1.1em; 
    font-weight: bold; 
    cursor: pointer; 
    margin-top: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transition: transform 0.2s, background 0.2s;
}
.btn-save:active { transform: scale(0.98); }
.btn-save:disabled { background: #555; cursor: not-allowed; }
.btn-install {
    display: none;
    width: 100%;
    margin-bottom: 15px;
    padding: 12px;
    background: #ffd700;
    color: #000;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    text-align: center;
    text-decoration: none;
}
#status { text-align: center; margin-top: 15px; font-weight: 500; font-size: 0.9em; }
.ok { color: #2ecc71; }
.err { color: #e74c3c; }
.loading { color: #f1c40f; }

/* Mobile optimization */
@media (max-width: 600px) {
    .container { padding: 15px; }
    h1 { font-size: 1.5em; }
}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>⚽️ Máquina de Greens VIP</h1>
    </div>

    <button id="btnInstall" class="btn-install">📲 Instalar Aplicativo</button>

    <!-- Config Gerais -->
    <div class="card">
        <h2>📊 Configurações Globais</h2>
        <div class="grid">
            <div class="field">
                <label>APPM Min (Por Time)</label>
                <input type="number" id="g-appm-time" step="0.1" value="0.7">
            </div>
            <div class="field">
                <label>APPM Min (Total)</label>
                <input type="number" id="g-appm-total" step="0.1" value="1.4">
            </div>
            <div class="field">
                <label>Média Gols Partida</label>
                <input type="number" id="g-media-partida" step="0.1" value="2.2">
            </div>
            <div class="field">
                <label>Ataques Perig. Mín (Live)</label>
                <input type="number" id="g-atq-perig" value="15">
            </div>
            <div class="field">
                <label>Chutes no Alvo Mín</label>
                <input type="number" id="g-chutes-alvo" value="3">
            </div>
            <div class="field">
                <label>Diferença Máx (Fav Perdendo)</label>
                <input type="number" id="g-diff-max" value="1">
            </div>
        </div>
    </div>

    <!-- Mercado: HT -->
    <div class="card">
        <div class="switch-field">
            <h2>🔥 Over 0.5 Gols HT</h2>
            <input type="checkbox" id="ht-ativo" checked>
        </div>
        <div class="grid">
            <div class="field"><label>Minuto Início</label><input type="number" id="ht-inicio" value="15"></div>
            <div class="field"><label>Minuto Fim</label><input type="number" id="ht-fim" value="27"></div>
            <div class="field"><label>Média Gols HT Mín</label><input type="number" id="ht-media" step="0.1" value="1.0"></div>
        </div>
    </div>

    <!-- Mercado: BTTS -->
    <div class="card">
        <div class="switch-field">
            <h2>🔥 Ambas Marcam (BTTS)</h2>
            <input type="checkbox" id="btts-ativo" checked>
        </div>
        <div class="grid">
            <div class="field"><label>Minuto Início</label><input type="number" id="btts-inicio" value="55"></div>
            <div class="field"><label>Minuto Fim</label><input type="number" id="btts-fim" value="75"></div>
            <div class="field"><label>BTTS Prob. Mín (%)</label><input type="number" id="btts-prob" value="50"></div>
        </div>
    </div>

    <!-- Mercado: Over Goal Partida -->
    <div class="card">
        <div class="switch-field">
            <h2>🔥 Over Gol Partida</h2>
            <input type="checkbox" id="og-ativo" checked>
        </div>
        <div class="grid">
            <div class="field"><label>Minuto Início</label><input type="number" id="og-inicio" value="55"></div>
            <div class="field"><label>Minuto Fim</label><input type="number" id="og-fim" value="75"></div>
            <div class="field"><label>Favorito Emp/Perd 1</label>
                <select id="og-fav-cond">
                    <option value="true">Ativo</option>
                    <option value="false">Desativado</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Mercado: Escanteio HT -->
    <div class="card">
        <div class="switch-field">
            <h2>🚩 Escanteio HT</h2>
            <input type="checkbox" id="cht-ativo" checked>
        </div>
        <div class="grid">
            <div class="field"><label>Minuto Início</label><input type="number" id="cht-inicio" value="32"></div>
            <div class="field"><label>Minuto Fim</label><input type="number" id="cht-fim" value="38"></div>
            <div class="field"><label>Escanteios Mín (Soma)</label><input type="number" id="cht-esc" value="2"></div>
        </div>
    </div>

    <!-- Mercado: Escanteio FT -->
    <div class="card">
        <div class="switch-field">
            <h2>🚩 Escanteio FT</h2>
            <input type="checkbox" id="cft-ativo" checked>
        </div>
        <div class="grid">
            <div class="field"><label>Minuto Início</label><input type="number" id="cft-inicio" value="82"></div>
            <div class="field"><label>Minuto Fim</label><input type="number" id="cft-fim" value="88"></div>
            <div class="field"><label>Escanteios Mín (Soma)</label><input type="number" id="cft-esc" value="2"></div>
        </div>
    </div>

    <button class="btn-save" id="btnSalvar" onclick="salvarConfig()">💾 Salvar Configuração</button>
    <div id="status"></div>
</div>

<script>
const REPO = 'cleubianodasilva-png/maquina-de-greens-vip';
const CONFIG_PATH = 'config.json';

function getToken() {
  let t = localStorage.getItem('gh_token');
  if (!t) {
    t = prompt('🔑 Digite seu token do GitHub (GH_PAT):\n(Será salvo com segurança no seu navegador)');
    if (t) localStorage.setItem('gh_token', t);
  }
  return t;
}

function status(txt, cl) {
  const s = document.getElementById('status');
  s.textContent = txt;
  s.className = cl;
}

function getVal(id, type='num') {
  const el = document.getElementById(id);
  if (el.type === 'checkbox') return el.checked;
  if (type === 'num') return parseFloat(el.value);
  return el.value;
}

function setVal(id, val) {
  const el = document.getElementById(id);
  if (!el) return;
  if (el.type === 'checkbox') el.checked = !!val;
  else el.value = val;
}

async function loadConfig() {
  status('🔄 Carregando...', 'loading');
  const TOKEN = getToken();
  if (!TOKEN) { status('❌ Token necessário', 'err'); return; }
  
  try {
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${CONFIG_PATH}`, {
      headers: { 'Authorization': `Bearer ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!r.ok) throw new Error('Erro ao carregar do GitHub');
    const d = await r.json();
    window._configSha = d.sha;
    const cfg = JSON.parse(atob(d.content));
    
    // Globais
    const g = cfg.geral || {};
    setVal('g-appm-time', g.appm_min_por_time);
    setVal('g-appm-total', g.appm_min_total);
    setVal('g-media-partida', g.media_gols_partida_min);
    setVal('g-atq-perig', g.ataques_perigosos_min);
    setVal('g-chutes_alvo', g.chutes_alvo_min);
    setVal('g-diff-max', g.diferenca_gols_fav_max);
    
    // Mercados
    const m = cfg.mercados || {};
    const ht = m.over_05_ht || {};
    setVal('ht-ativo', ht.ativo);
    setVal('ht-inicio', ht.minuto_inicio);
    setVal('ht-fim', ht.minuto_fim);
    setVal('ht-media', (ht.criterios||{}).media_gols_ht_min);

    const btts = m.ambas_marcam || {};
    setVal('btts-ativo', btts.ativo);
    setVal('btts-inicio', btts.minuto_inicio);
    setVal('btts-fim', btts.minuto_fim);
    setVal('btts-prob', (btts.criterios||{}).btts_probabilidade_min);

    const og = m.over_gol_partida || {};
    setVal('og-ativo', og.ativo);
    setVal('og-inicio', og.minuto_inicio);
    setVal('og-fim', og.minuto_fim);
    
    const cht = m.escanteio_ht || {};
    setVal('cht-ativo', cht.ativo);
    setVal('cht-inicio', cht.minuto_inicio);
    setVal('cht-fim', cht.minuto_fim);
    setVal('cht-esc', (cht.criterios||{}).escanteios_minimos);

    const cft = m.escanteio_ft || {};
    setVal('cft-ativo', cft.ativo);
    setVal('cft-inicio', cft.minuto_inicio);
    setVal('cft-fim', cft.minuto_fim);
    setVal('cft-esc', (cft.criterios||{}).escanteios_minimos);

    status('✅ Pronto!', 'ok');
  } catch (e) {
    status('❌ Erro: ' + e.message, 'err');
  }
}

async function salvarConfig() {
  const btn = document.getElementById('btnSalvar');
  btn.disabled = true;
  status('💾 Salvando...', 'loading');
  const TOKEN = getToken();

  try {
    // Monta o JSON (Preservando estrutura)
    const cfg = {
      geral: {
        appm_min_por_time: getVal('g-appm-time'),
        appm_min_total: getVal('g-appm-total'),
        media_gols_partida_min: getVal('g-media-partida'),
        ataques_perigosos_min: getVal('g-atq-perig'),
        chutes_alvo_min: getVal('g-chutes-alvo'),
        diferenca_gols_fav_max: getVal('g-diff-max')
      },
      mercados: {
        over_05_ht: {
          ativo: getVal('ht-ativo'),
          minuto_inicio: getVal('ht-inicio'),
          minuto_fim: getVal('ht-fim'),
          criterios: { media_gols_ht_min: getVal('ht-media') }
        },
        ambas_marcam: {
          ativo: getVal('btts-ativo'),
          minuto_inicio: getVal('btts-inicio'),
          minuto_fim: getVal('btts-fim'),
          criterios: { btts_probabilidade_min: getVal('btts-prob') }
        },
        over_gol_partida: {
          ativo: getVal('og-ativo'),
          minuto_inicio: getVal('og-inicio'),
          minuto_fim: getVal('og-fim')
        },
        escanteio_ht: {
          ativo: getVal('cht-ativo'),
          minuto_inicio: getVal('cht-inicio'),
          minuto_fim: getVal('cht-fim'),
          criterios: { escanteios_minimos: getVal('cht-esc') }
        },
        escanteio_ft: {
          ativo: getVal('cft-ativo'),
          minuto_inicio: getVal('cft-inicio'),
          minuto_fim: getVal('cft-fim'),
          criterios: { escanteios_minimos: getVal('cft-esc') }
        }
      }
    };

    const content = btoa(unescape(encodeURIComponent(JSON.stringify(cfg, null, 2))));
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${CONFIG_PATH}`, {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'painel: atualiza config', content, sha: window._configSha })
    });
    
    if (!r.ok) throw new Error('Erro ao salvar');
    const res = await r.json();
    window._configSha = res.content.sha;
    status('✅ Salvo com sucesso!', 'ok');
    btn.disabled = false;
  } catch (e) {
    status('❌ Erro: ' + e.message, 'err');
    btn.disabled = false;
  }
}

// PWA: Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

// Install Prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('btnInstall').style.display = 'block';
});

document.getElementById('btnInstall').addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') {
        document.getElementById('btnInstall').style.display = 'none';
    }
    deferredPrompt = null;
  }
});

loadConfig();
</script>
</body>
</html>
